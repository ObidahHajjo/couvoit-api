name: tests

on:
  push:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  phpunit:
    runs-on: ubuntu-latest

    env:
      APP_ENV: testing
      APP_MAINTENANCE_DRIVER: file
      BCRYPT_ROUNDS: 4
      BROADCAST_CONNECTION: "null"
      CACHE_STORE: array
      MAIL_MAILER: array
      QUEUE_CONNECTION: sync
      SESSION_DRIVER: array
      PULSE_ENABLED: "false"
      TELESCOPE_ENABLED: "false"
      NIGHTWATCH_ENABLED: "false"

      DB_CONNECTION: sqlite
      DB_DATABASE: database/database.sqlite
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.5
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          extensions: mbstring, dom, fileinfo, pdo, pdo_sqlite, sqlite3
          coverage: xdebug
          tools: composer:v2

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache/files
            vendor
          key: ${{ runner.os }}-php82-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php85-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare environment
        run: |
          cp .env.example .env
          mkdir -p database
          touch database/database.sqlite
          php artisan key:generate
          php artisan config:clear

      - name: Run migrations
        run: php artisan migrate --force

      - name: Run tests
        run: php artisan test

      - name: Run tests with coverage
        run: php artisan test --coverage-clover=coverage.xml

      - name: Debug Sonar config
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' }}
        run: |
          echo "SONAR_HOST_URL=${SONAR_HOST_URL}"
          if [ -n "${SONAR_TOKEN}" ]; then
            echo "SONAR_TOKEN is set"
            echo "SONAR_TOKEN length: ${#SONAR_TOKEN}"
          else
            echo "SONAR_TOKEN is missing"
            exit 1
          fi

      - name: Verify Sonar server reachability
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' }}
        run: |
          curl -sS "${SONAR_HOST_URL}/api/system/status"

      - name: Check token fingerprint
        if: ${{ secrets.SONAR_TOKEN != '' }}
        run: |
          printf '%s' "$SONAR_TOKEN" | sha256sum
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: SonarQube Scan
        if: ${{ secrets.SONAR_TOKEN != '' && secrets.SONAR_HOST_URL != '' }}
        uses: sonarsource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=covoit-api
            -Dsonar.token=${{ secrets.SONAR_TOKEN }}
            -Dsonar.verbose=true
            -X
