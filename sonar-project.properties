sonar.projectKey=covoit-api
sonar.projectName=covoit-api
sonar.sourceEncoding=UTF-8

# Only analyze application code
sonar.sources=app
sonar.tests=tests

# PHP coverage report (generated by php artisan test --coverage-clover=coverage.xml)
sonar.php.coverage.reportPaths=coverage.xml

# Completely exclude from analysis
sonar.exclusions=vendor/**,storage/**,bootstrap/**,public/**

# Exclude from coverage only (still analyzed for bugs)
sonar.coverage.exclusions=\
**/database/**,\
**/config/**,\
**/routes/**,\
**/tests/**,\
**/app/Swagger/**,\
**/*Factory.php,\
**/*Seeder.php
